<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting Classifier</title>
  <style>
    /* ========================================
       GLOBAL STYLES & RESET
       ======================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      color: #e2e8f0;
      padding: 20px;
    }

    /* ========================================
       HEADER SECTION
       ======================================== */
    header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 1rem;
    }

    /* ========================================
       LEGEND (Color Guide)
       ======================================== */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    /* ========================================
       TAB NAVIGATION
       ======================================== */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab-btn {
      padding: 10px 28px;
      border-radius: 30px;
      border: 2px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .tab-btn:hover:not(.active) {
      border-color: #6366f1;
      color: #c7d2fe;
    }

    /* ========================================
       PANELS (Tab Content Containers)
       ======================================== */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ========================================
       CARD CONTAINER
       ======================================== */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      max-width: 800px;
      margin: 0 auto 20px;
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #f1f5f9;
    }

    /* ========================================
       INPUT FIELDS (Textarea & Buttons)
       ======================================== */
    textarea {
      width: 100%;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 10px;
      padding: 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      resize: vertical;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #6366f1;
    }

    .btn {
      margin-top: 14px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ========================================
       EXAMPLE BUTTONS
       ======================================== */
    .example-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .ex-btn {
      padding: 6px 14px;
      background: #334155;
      border: none;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .ex-btn:hover { background: #475569; color: #e2e8f0; }

    /* ========================================
       RESULT BOX (Single Prediction)
       ======================================== */
    .result-box {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      border-left: 5px solid;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Color variants for different labels */
    .result-box.decision   { background: #1a2e1a; border-color: #22c55e; }
    .result-box.action     { background: #1a1a2e; border-color: #f59e0b; }
    .result-box.discussion { background: #1a2040; border-color: #60a5fa; }

    .result-label {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .decision   .result-label { color: #22c55e; }
    .action     .result-label { color: #f59e0b; }
    .discussion .result-label { color: #60a5fa; }

    .result-conf {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 16px;
    }
