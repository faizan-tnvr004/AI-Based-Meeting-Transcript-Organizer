<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting Classifier</title>
  <style>
    /* ========================================
       GLOBAL STYLES & RESET
       ======================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      color: #e2e8f0;
      padding: 20px;
    }

    /* ========================================
       HEADER SECTION
       ======================================== */
    header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 1rem;
    }

    /* ========================================
       LEGEND (Color Guide)
       ======================================== */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
